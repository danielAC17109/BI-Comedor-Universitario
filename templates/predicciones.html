<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Predicciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

{% include 'pasos.html' %}

<div class="alert alert-danger text-center">
    <h3> PASO 5 DE 7</h3>
    <h4>PREDICCIONES IA</h4>
</div>

<div class="container mt-5">
    <div class="card p-5 shadow">

        <h1>PREDICCIONES IA</h1>

        <form method="POST" action="/generar_prediccion">

            <select class="form-select mt-4" name="tipo_prediccion">
                <option value="demanda">Predicción Demanda</option>
                <option value="ingresos">Predicción Ingresos</option>
                <option value="consumo">Predicción Consumo</option>
            </select>

            <button
                id="btnPrediccion"
                type="submit"
                class="btn btn-success mt-4">
                Generar Predicción
            </button>

        </form>

        {% if resultado %}
        <div class="alert alert-success mt-4">
            <h4>Resultado Predicción</h4>
            <hr>
            <h2>{{ resultado }}</h2>
        </div>
        {% endif %}

        <div class="mt-4">
            <a href="/snowflake" class="btn btn-secondary">← Regresar</a>
            <a href="/kpis" class="btn btn-primary ms-3">Continuar →</a>
        </div>

    </div>
</div>

<script>
document.getElementById("btnPrediccion").addEventListener("click", function(){
    registrarEvento("prediccion_generada");
});
</script>

</body>
</html>
